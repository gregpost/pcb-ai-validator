<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB AI Validator - Console</title>
</head>
<body style="font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px;">
    <h1 style="color: #2563eb;">PCB AI Validator - Console</h1>
    <button onclick="run()" style="padding: 10px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px;">Запустить Pipeline</button>
    <pre id="out" style="background: #000; padding: 15px; border: 1px solid #333; margin-top: 20px; overflow: auto; max-height: 70vh; white-space: pre-wrap;">Ожидание запуска...</pre>

    <script>
        const out = document.getElementById('out');
        const btn = document.querySelector('button');

        async function updateLogs() {
            const r = await fetch('/logs');
            const text = await r.text();
            out.innerText = text;
            return text;
        }

        // Initial load
        updateLogs();

        async function run() {
            btn.disabled = true;
            btn.innerText = 'Выполняется...';
            await fetch('/run');
            
            const interval = setInterval(async () => {
                const text = await updateLogs();
                if (text.includes('PROCESSING COMPLETED')) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.innerText = 'Запустить Pipeline';
                }
            }, 1000);
        }
    </script>
</body>
</html>
